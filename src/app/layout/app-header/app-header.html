<header class="sticky top-0 z-40 border-b border-stone-200/80 bg-stone-50/90 backdrop-blur dark:border-stone-800/80 dark:bg-stone-950/90">
  <div class="mx-auto flex h-16 w-full max-w-6xl items-center justify-between gap-3 px-4 sm:px-6 lg:px-8">
    <a
      routerLink="/"
      class="text-sm font-semibold uppercase tracking-[0.18em] text-stone-700 transition-colors hover:text-stone-950 dark:text-stone-300 dark:hover:text-stone-50"
    >
      Coffee Codex
    </a>

    <div class="flex items-center gap-2">
      <button
        type="button"
        aria-label="Toggle search"
        class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-stone-300/80 text-stone-700 transition-colors hover:bg-stone-100 dark:border-stone-700 dark:text-stone-200 dark:hover:bg-stone-800 sm:hidden"
        [attr.aria-expanded]="isMobileSearchExpanded()"
        aria-controls="mobile-header-search"
        (click)="toggleMobileSearch()"
      >
        <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>

      <form
        role="search"
        class="hidden items-center gap-2 rounded-full border border-stone-300/80 bg-white px-3 py-1.5 dark:border-stone-700 dark:bg-stone-900 sm:flex"
        (submit)="$event.preventDefault(); submitSearch()"
      >
        <label class="sr-only" for="desktop-header-search">Search recipes</label>
        <svg
          viewBox="0 0 24 24"
          class="h-4 w-4 text-stone-500 dark:text-stone-400"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          aria-hidden="true"
        >
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>

        <input
          id="desktop-header-search"
          type="search"
          inputmode="search"
          placeholder="Search recipes"
          class="w-44 bg-transparent text-sm text-stone-800 placeholder:text-stone-500 focus:outline-none dark:text-stone-100 dark:placeholder:text-stone-400 lg:w-56"
          [value]="searchInput()"
          (input)="updateSearchInput($any($event.target).value)"
          (keydown.enter)="$event.preventDefault(); submitSearch()"
        />

        @if (searchInput()) {
          <button
            type="button"
            aria-label="Clear search"
            class="inline-flex h-7 w-7 items-center justify-center rounded-full text-stone-500 transition-colors hover:bg-stone-100 hover:text-stone-700 dark:text-stone-400 dark:hover:bg-stone-800 dark:hover:text-stone-100"
            (click)="clearSearch()"
          >
            <svg viewBox="0 0 24 24" class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        }

        <button
          type="submit"
          class="inline-flex h-8 items-center justify-center rounded-full bg-stone-900 px-3 text-xs font-medium uppercase tracking-[0.14em] text-stone-50 transition-colors hover:bg-stone-700 dark:bg-stone-100 dark:text-stone-900 dark:hover:bg-stone-300"
        >
          Search
        </button>
      </form>

      <app-theme-toggle />

      <button
        type="button"
        class="h-10 rounded-full border border-stone-300/80 px-4 text-sm font-medium text-stone-700 transition-colors hover:bg-stone-100 dark:border-stone-700 dark:text-stone-200 dark:hover:bg-stone-800"
      >
        Sign In
      </button>
    </div>
  </div>

  @if (isMobileSearchExpanded()) {
    <div id="mobile-header-search" class="mx-auto w-full max-w-6xl px-4 pb-3 sm:hidden">
      <form
        role="search"
        class="space-y-2 rounded-2xl border border-stone-300/80 bg-white p-3 dark:border-stone-700 dark:bg-stone-900"
        (submit)="$event.preventDefault(); submitSearch()"
      >
        <label class="sr-only" for="mobile-header-search-input">Search recipes</label>
        <input
          id="mobile-header-search-input"
          type="search"
          inputmode="search"
          autofocus
          placeholder="Search recipes"
          class="w-full rounded-xl border border-stone-300/80 bg-stone-50 px-3 py-2 text-sm text-stone-800 placeholder:text-stone-500 focus:border-amber-500 focus:outline-none dark:border-stone-700 dark:bg-stone-950 dark:text-stone-100 dark:placeholder:text-stone-400"
          [value]="searchInput()"
          (input)="updateSearchInput($any($event.target).value)"
          (keydown.enter)="$event.preventDefault(); submitSearch()"
        />

        <div class="flex items-center justify-end gap-2">
          @if (searchInput()) {
            <button
              type="button"
              class="inline-flex h-9 items-center justify-center rounded-full border border-stone-300/80 px-3 text-xs font-medium uppercase tracking-[0.14em] text-stone-700 transition-colors hover:bg-stone-100 dark:border-stone-700 dark:text-stone-200 dark:hover:bg-stone-800"
              (click)="clearSearch()"
            >
              Clear
            </button>
          }

          <button
            type="button"
            class="inline-flex h-9 items-center justify-center rounded-full border border-stone-300/80 px-3 text-xs font-medium uppercase tracking-[0.14em] text-stone-700 transition-colors hover:bg-stone-100 dark:border-stone-700 dark:text-stone-200 dark:hover:bg-stone-800"
            (click)="toggleMobileSearch()"
          >
            Close
          </button>

          <button
            type="submit"
            class="inline-flex h-9 items-center justify-center rounded-full bg-stone-900 px-4 text-xs font-medium uppercase tracking-[0.14em] text-stone-50 transition-colors hover:bg-stone-700 dark:bg-stone-100 dark:text-stone-900 dark:hover:bg-stone-300"
          >
            Search
          </button>
        </div>
      </form>
    </div>
  }
</header>
